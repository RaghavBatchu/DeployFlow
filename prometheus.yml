global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "deployflow-backend"
    metrics_path: "/metrics"
    static_configs:
      # If running via Docker Compose, host.docker.internal allows access to the host machine's port 5001.
      # If running on Linux Native Docker, you might need to use the Docker Gateway IP or the network hostname.
      - targets: ["host.docker.internal:5001", "172.17.0.1:5001"]
